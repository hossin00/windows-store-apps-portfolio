name: Build App 01 — PDF OCR Desk

on:
  push:
    branches: [main]
    paths:
      - 'apps/01-pdf-ocr-desk/**'
  pull_request:
    paths:
      - 'apps/01-pdf-ocr-desk/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/01-pdf-ocr-desk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/01-pdf-ocr-desk/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check + Vite build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: pdf-ocr-desk-dist
          path: apps/01-pdf-ocr-desk/dist/
          retention-days: 7
